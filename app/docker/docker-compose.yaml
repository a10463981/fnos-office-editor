# ============================================================================
# OnlyOffice Document Server - Docker Compose
# 由 FNos OfficeEditor 管理
# ============================================================================

services:
  onlyoffice-docserver:
    image: onlyoffice/documentserver:latest
    container_name: officeeditor-docserver
    restart: unless-stopped
    ports:
      - "9080:80"    # OnlyOffice HTTP API
    environment:
      - JWT_ENABLED=true
      - JWT_SECRET=${JWT_SECRET:-officeeditor-default-secret}
      - LOG_LEVEL=warn
    volumes:
      - officeeditor-ds-cache:/var/lib/onlyoffice
      - officeeditor-ds-data:/var/www/onlyoffice/Data
      - officeeditor-ds-log:/var/log/onlyoffice
      - officeeditor-ds-fonts:/usr/share/fonts
    labels:
      - "app.officeeditor.managed=true"

volumes:
  officeeditor-ds-cache:
    name: officeeditor-ds-cache
  officeeditor-ds-data:
    name: officeeditor-ds-data
  officeeditor-ds-log:
    name: officeeditor-ds-log
  officeeditor-ds-fonts:
    name: officeeditor-ds-fonts
