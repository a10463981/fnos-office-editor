<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FNos 办公编辑器</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            background: #f5f7fa;
            color: #333;
        }
        .container {
            text-align: center;
            padding: 40px;
            background: white;
            border-radius: 12px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.1);
        }
        h1 { color: #1a73e8; font-size: 28px; margin-bottom: 8px; }
        p { color: #666; font-size: 16px; margin: 4px 0; }
        .status { color: #34a853; font-weight: 500; }
    </style>
</head>
<body>
    <div class="container">
        <h1>📄 FNos 办公编辑器</h1>
        <p>基于 OnlyOffice 的在线文档编辑器</p>
        <p class="status">✅ 服务运行中</p>
        <p>请通过飞牛文件管理器右键打开 Office 文档</p>
    </div>
</body>
</html>
